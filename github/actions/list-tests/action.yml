name: list-tests

description: |
  Lists all Playwright tests to run for a given platform and risk.

inputs:
  PLATFORM:
    description: "Platform to filter tests 'android'|'ios'"
    required: true
  RISK:
    description: "Risk level to filter tests 'high-risk'|'medium-risk'|'low-risk'|''"
    required: false
  PRO_GREP_INVERT:
    description: 'Optional --grep-invert flag to exclude @pro tests'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: List all tests to run for platform ${{ inputs.PLATFORM }} with risk ${{ inputs.RISK }}
      shell: bash
      run: |
        pwd
        npx playwright test --list --reporter list --grep "(?=.*@${{ inputs.PLATFORM }})(?=.*@${{ inputs.RISK }})" ${{ inputs.PRO_GREP_INVERT }}
