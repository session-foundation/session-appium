name: Prune Old Allure Reports
on:
  schedule:
    - cron: '0 16 * * 0' # Weekly, 16:00 UTC Sunday
  workflow_dispatch:
    inputs:
      attachment-retention-days:
        description: 'Number of days to retain attachments'
        required: false
        default: '14'
        type: string
      report-retention-days:
        description: 'Number of days to retain full report directories'
        required: false
        default: '60'
        type: string
      dry-run:
        description: 'If true, only list files that would be deleted (no deletion or commit)'
        required: false
        default: 'false'
        type: boolean

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          lfs: true
          fetch-depth: 0 # Get full history to check file ages
          submodules: 'recursive'
        env:
          GIT_LFS_SKIP_SMUDGE: 1 # Don't actually download LFS content

      - name: Prune old attachments and report directories
        env:
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
          ATTACHMENT_DAYS: ${{ github.event.inputs.attachment-retention-days || '14' }}
          REPORT_DAYS: ${{ github.event.inputs.report-retention-days || '60' }}
        run: |
          [[ "$ATTACHMENT_DAYS" =~ ^[1-9][0-9]*$ ]] || { echo "Error: retention-days must be a positive integer"; exit 1; }
          [[ "$REPORT_DAYS" =~ ^[1-9][0-9]*$ ]] || { echo "Error: report-retention-days must be a positive integer"; exit 1; }

          PREVIEW_LIMIT=20

          # Returns 0 (true) if the given path's last commit is older than the given cutoff epoch
          is_older_than() {
            local path="$1" cutoff="$2"
            local commit_date
            commit_date=$(git log -1 --format="%ct" -- "$path" 2>/dev/null || echo "0")
            [ "$commit_date" -ne "0" ] && [ "$commit_date" -lt "$cutoff" ]
          }

          # Previews or deletes items listed in a file, then summarises
          apply_deletions() {
            local list="$1" label="$2"
            local count
            count=$(wc -l < "$list" 2>/dev/null || echo 0)
            echo "Found $count old $label" >> $GITHUB_STEP_SUMMARY
            if [ "$count" -gt 0 ]; then
              if [ "$DRY_RUN" == "true" ]; then
                echo "$label to delete:" >> $GITHUB_STEP_SUMMARY
                head -$PREVIEW_LIMIT "$list" >> $GITHUB_STEP_SUMMARY
                [ "$count" -gt $PREVIEW_LIMIT ] && echo "...(+$((count-PREVIEW_LIMIT)) more)" >> $GITHUB_STEP_SUMMARY
              else
                while IFS= read -r item; do rm -rf "$item"; done < "$list"
                echo "Deleted $count $label" >> $GITHUB_STEP_SUMMARY
              fi
            fi
            rm -f "$list"
          }

          echo "Attachment retention: $ATTACHMENT_DAYS days | Report retention: $REPORT_DAYS days | Dry run: $DRY_RUN" >> $GITHUB_STEP_SUMMARY

          # Prune attachment files older than ATTACHMENT_DAYS
          ATTACHMENT_CUTOFF=$(date -d "$ATTACHMENT_DAYS days ago" +%s)
          ATTACHMENT_LIST="attachments_to_delete.txt"
          > "$ATTACHMENT_LIST"
          for pattern in '*/data/attachments/*.png' '*/data/attachments/*.txt' '*/data/attachments/*.imagediff'; do
            while IFS= read -r -d '' file; do
              is_older_than "$file" "$ATTACHMENT_CUTOFF" && echo "$file" >> "$ATTACHMENT_LIST"
            done < <(git ls-files -z "$pattern")
          done
          apply_deletions "$ATTACHMENT_LIST" "attachment files"

          # Prune report directories older than REPORT_DAYS
          REPORT_CUTOFF=$(date -d "$REPORT_DAYS days ago" +%s)
          REPORT_LIST="reports_to_delete.txt"
          > "$REPORT_LIST"
          for dir in android/run-* ios/run-*; do
            [ -d "$dir" ] && is_older_than "$dir" "$REPORT_CUTOFF" && echo "$dir" >> "$REPORT_LIST"
          done
          apply_deletions "$REPORT_LIST" "report directories"

      - name: Commit changes
        if: github.event.inputs.dry-run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "ci: prune old attachments and report directories"
            git push
          fi

      - name: Prune LFS objects
        if: github.event.inputs.dry-run != 'true'
        run: |
          git lfs prune --verify-remote || echo "LFS prune failed"
