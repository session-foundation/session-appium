name: iOS regression tests
run-name: '${{ inputs.RISK }} regressions on ${{ github.head_ref || github.ref }}'

on:
  workflow_dispatch:
    inputs:
      NETWORK_TARGET:
        description: 'network target to run the tests on'
        required: true
        type: choice
        options:
          - 'devnet'
          - 'testnet'
          - 'mainnet'
        default: 'mainnet'

      APK_URL:
        description: 'ipa url to test (.tar.xz)'
        required: true
        type: string

      BUILD_NUMBER:
        description: 'build number used for the report (e.g. 2.11.0)'
        required: true
        type: string

      RISK:
        description: 'risks to target'
        required: false
        type: choice
        options:
          - 'high-risk'
          - 'medium-risk'
          - 'low-risk'
          - ''

      RUN_PRO_TESTS:
        description: 'include Session Pro tests in this run'
        required: false
        default: false
        type: boolean

      ALLURE_ENABLED:
        description: 'generate allure report'
        required: false
        default: true
        type: boolean

      PLAYWRIGHT_RETRIES_COUNT:
        description: 'retries of failing tests to do at most'
        required: true
        type: choice
        options:
          - '0'
          - '1'
          - '2'
        default: '0'

      PLAYWRIGHT_WORKERS_COUNT:
        description: 'number of workers to use (ios only)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '3'

      LOG_LEVEL:
        description: 'Test logging verbosity (WARNING: anything other than minimal mode may crash GitHub Actions on large test runs)'
        required: true
        type: choice
        options:
          - 'minimal' # Recommended for full regressions
          - 'failures' # Show failed test logs only
          - 'verbose' # All test logs - use with caution!
        default: 'minimal'

permissions:
  contents: write

jobs:
  ios-regression:
    runs-on: [self-hosted, macOS]
    env:
      PLATFORM: 'ios'
      APK_URL: ${{ github.event.inputs.APK_URL }}
      BUILD_NUMBER: ${{ github.event.inputs.BUILD_NUMBER }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI: 1
      ALLURE_ENABLED: ${{ github.event.inputs.ALLURE_ENABLED }}
      IOS_APP_PATH_PREFIX: './extracted/Session.app'
      ANDROID_APK: '<just_not_empty>'
      APPIUM_ADB_FULL_PATH: '<just_not_empty>'
      ANDROID_SDK_ROOT: '<just_not_empty>'
      PLAYWRIGHT_RETRIES_COUNT: ${{ github.event.inputs.PLAYWRIGHT_RETRIES_COUNT }}
      # iOS selects the network at launch (one build, no AQA/regular variants like Android):
      # NETWORK_TARGET drives capabilities_ios.ts + getNetworkTarget (and is used for the report).
      # For devnet the app also needs the seed-node connection details below; they are only read
      # when devnet is selected, so they are harmless on mainnet/testnet runs. Store them as
      # repo-level Actions *variables* (the pubkey is public; the IP/ports are internal), e.g.
      # Settings > Secrets and variables > Actions. DEVNET_IP must be the address the runner can
      # reach (the same devnet as Android's sesh-net.local:1280); the seeder derives its seed URL
      # from DEVNET_IP:DEVNET_HTTP_PORT.
      NETWORK_TARGET: ${{ github.event.inputs.NETWORK_TARGET }}
      DEVNET_PUBKEY: ${{ vars.DEVNET_PUBKEY }}
      DEVNET_IP: ${{ vars.DEVNET_IP }}
      DEVNET_HTTP_PORT: ${{ vars.DEVNET_HTTP_PORT }}
      DEVNET_OMQ_PORT: ${{ vars.DEVNET_OMQ_PORT }}
      _TESTING: 1 # Always hide webdriver logs (@appium/support/ flag)
      PRINT_FAILED_TEST_LOGS: ${{ github.event.inputs.LOG_LEVEL != 'minimal' && '1' || '0' }} # Show stdout/stderr if test fails (@session-foundation/playwright-reporter/ flag)
      PRINT_ONGOING_TEST_LOGS: ${{ github.event.inputs.LOG_LEVEL == 'verbose' && '1' || '0' }} # Show everything as it happens (@session-foundation/playwright-reporter/ flag)
      PLAYWRIGHT_WORKERS_COUNT: 3 # for iOS, this is the max we can have on our self-hosted runner
      SOGS_ADMIN_SEED: ${{ secrets.SOGS_ADMIN_SEED }}
      PRO_GREP_INVERT: ${{ inputs.RUN_PRO_TESTS != true && '--grep-invert @pro' || '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: 'recursive'

      - name: Fetch result history from gh-pages
        uses: ./github/actions/fetch-allure-history
        if: ${{ env.ALLURE_ENABLED == 'true' }}
        with:
          PLATFORM: ${{ env.PLATFORM }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fail fast (before the app download / sim setup) if devnet was requested but its
      # connection details are missing or the seed node is unreachable. Mirrors the Android
      # workflow's probe. On mainnet this step is skipped entirely.
      - name: Probe devnet reachability
        if: ${{ github.event.inputs.NETWORK_TARGET == 'devnet' }}
        shell: bash
        run: |
          if [ -z "$DEVNET_PUBKEY" ] || [ -z "$DEVNET_IP" ] || [ -z "$DEVNET_HTTP_PORT" ] || [ -z "$DEVNET_OMQ_PORT" ]; then
            echo "ERROR: NETWORK_TARGET=devnet but not all DEVNET_* Actions variables are set"
            echo "  DEVNET_PUBKEY set? $([ -n "$DEVNET_PUBKEY" ] && echo yes || echo NO)"
            echo "  DEVNET_IP='$DEVNET_IP' DEVNET_HTTP_PORT='$DEVNET_HTTP_PORT' DEVNET_OMQ_PORT='$DEVNET_OMQ_PORT'"
            exit 1
          fi
          SEED="http://${DEVNET_IP}:${DEVNET_HTTP_PORT}"
          echo "Requested devnet -> probing seed node $SEED"
          for attempt in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 "$SEED" 2>/dev/null || echo '000')
            if [ "$CODE" != "000" ]; then echo "Devnet reachable (HTTP $CODE)"; exit 0; fi
            echo "attempt $attempt/3 failed"; [ "$attempt" -lt 3 ] && sleep "$attempt"
          done
          echo "ERROR: devnet seed node $SEED not reachable after 3 attempts"; exit 1

      - name: Download ipa and extract it
        run: |
          curl -o session-ios.sim.tar.xz ${{ github.event.inputs.APK_URL }}
          ls
          pwd
          tar -tf session-ios.sim.tar.xz
          tar xf session-ios.sim.tar.xz
          mkdir -p extracted
          mv session-ios-*-sim/*.app extracted/
          ls extracted

      - name: Setup for both platforms
        uses: ./github/actions/setup

      - name: Stop simulators
        shell: bash
        run: |
          npx --yes ts-node scripts/stop_ios.ts

      - name: Start simulators
        shell: bash
        if: false # appium is starting the simulators (seems to be somewhat more reliable)
        run: |
          npx --yes ts-node scripts/start_ios.ts # don't auto start the simulators, let appium do it (seems somewhat more reliable)

      - name: List tests part of this run
        uses: ./github/actions/list-tests
        with:
          PLATFORM: ${{ env.PLATFORM }}
          RISK: ${{ github.event.inputs.RISK }}
          PRO_GREP_INVERT: ${{ env.PRO_GREP_INVERT }}

      - name: Run the iOS tests​​ (all device counts)
        env:
          DEVICES_PER_TEST_COUNT: 4
          _TESTING: ${{ env._TESTING }}
          PRINT_FAILED_TEST_LOGS: ${{ env.PRINT_FAILED_TEST_LOGS }}
          PRINT_ONGOING_TEST_LOGS: ${{ env.PRINT_ONGOING_TEST_LOGS }}
        run: |
          pwd
          npx playwright test --grep "(?=.*@${PLATFORM})(?=.*@${{ github.event.inputs.RISK }})" $PRO_GREP_INVERT #Note: this has to be double quotes

      - name: Generate and publish test report
        uses: ./github/actions/generate-publish-test-report
        if: ${{ always() && env.ALLURE_ENABLED == 'true' }}
        with:
          PLATFORM: ${{ env.PLATFORM }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_URL: ${{env.APK_URL}}
          RISK: ${{github.event.inputs.RISK}}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          NETWORK_TARGET: ${{ env.NETWORK_TARGET }}

      - name: Upload results of this run
        uses: ./github/actions/upload-test-results
        with:
          PLATFORM: ${{ env.PLATFORM }}
          UPLOAD_IDENTIFIER: 'devices-other-test-run'

      - name: Upload csv of this whole run
        uses: ./github/actions/upload-csv-test-results
        if: always()
        with:
          PLATFORM: ${{ env.PLATFORM }}

      - name: Stop emulators
        if: always()
        continue-on-error: true # just so we don't fail
        shell: bash
        run: |
          source ./scripts/ci.sh
          npx --yes ts-node scripts/stop_ios.ts
